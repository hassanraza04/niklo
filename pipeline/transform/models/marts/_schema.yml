version: 2

models:
  - name: dim_venue
    description: canonical one-row-per-venue table the app serves from
    columns:
      - name: venue_id
        description: google place_id, the dedupe key
        data_tests: [unique, not_null]
      - name: slug
        description: url slug for the venue page
        data_tests: [unique, not_null]
      - name: name
        data_tests: [not_null]
      - name: subcategory_slug
        data_tests: [not_null]
